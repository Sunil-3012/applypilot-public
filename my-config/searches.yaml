# ApplyPilot search configuration — Sunil Gangupamu
# Place this file at: ~/.applypilot/searches.yaml

# ── Search queries ────────────────────────────────────────────────────────────
# Tier 1: Best-fit titles (Java/Spring Boot + Full Stack)
# Tier 2: Strong matches (cloud, backend, broader scope)
# Tier 3: Wide net (anything Sunil can realistically do)

queries:
  # Tier 1 — Core targets
  - query: "software engineer"
    tier: 1
  - query: "full stack Engineer"
    tier: 1
  - query: "backend engineer"
    tier: 1

  # Tier 2 — Strong matches
  - query: "Java developer"
    tier: 2
  - query: "cloud engineer AWS"
    tier: 2
  - query: "DevOps engineer"
    tier: 2

# ── Locations ─────────────────────────────────────────────────────────────────
locations:
  - location: "Remote"
    remote: true
  - location: "Tampa, FL"
    remote: false
  - location: "United States"
    remote: false

# ── Location filtering ────────────────────────────────────────────────────────
location:
  accept_patterns:
    - "Remote"
    - "Anywhere"
    - "Tampa"
    - "Florida"
    - "FL"
    - "United States"
    - "US"
    - "USA"
    - "Hybrid"
    - "New York"
    - "San Francisco"
    - "Seattle"
    - "Austin"
    - "Chicago"
    - "Boston"
    - "Atlanta"
    - "Dallas"
    - "Denver"
    - "Charlotte"
    - "Orlando"
    - "Miami"
    - "Jacksonville"
    - "Phoenix"
    - "Los Angeles"
  reject_patterns:
    - "London, UK"
    - "India"
    - "Philippines"
    - "Canada only"
    - "Australia only"
    - "New Zealand"
    - "UK only"
    - "Europe only"

# ── Country ───────────────────────────────────────────────────────────────────
country: "USA"

# ── Scrapers ──────────────────────────────────────────────────────────────────
workday_enabled: false      # Set to true to also scrape company Workday portals
smartextract_enabled: false # Set to true to enable AI-powered scraping

# ── Job boards ────────────────────────────────────────────────────────────────
boards:
  - indeed
  - linkedin
  - zip_recruiter

# ── Search defaults ───────────────────────────────────────────────────────────
defaults:
  results_per_site: 100   # Max results per board per query
  hours_old: 24           # Only jobs posted in the last 72 hours

# ── Negative keywords — skip jobs with these in the title ─────────────────────
exclude_titles:
  - "senior director"
  - "VP "
  - "vice president"
  - "chief"
  - "intern"
  - "internship"
  - "co-op"
  - "clearance required"
  - "TS/SCI"
  - "principal scientist"
  - "staff scientist"
  - "distinguished engineer"
  - "fellow"
  - "C++ only"
  - "embedded systems"
  - "firmware"
  - "FPGA"
