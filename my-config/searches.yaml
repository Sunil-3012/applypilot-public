# ApplyPilot search configuration — Sunil Gangupamu
# Place this file at: ~/.applypilot/searches.yaml

# ── Search queries ────────────────────────────────────────────────────────────
# Tier 1: Best-fit titles (Java/Spring Boot + Full Stack)
# Tier 2: Strong matches (cloud, backend, broader scope)
# Tier 3: Wide net (anything Sunil can realistically do)

queries:
  # Tier 1 — Core targets
  - query: "software engineer Java"
    tier: 1
  - query: "backend engineer Java Spring Boot"
    tier: 1
  - query: "full stack engineer Java React"
    tier: 1
  - query: "software engineer"
    tier: 1
  - query: "backend engineer"
    tier: 1

  # Tier 2 — Strong matches
  - query: "full stack developer"
    tier: 2
  - query: "Java developer"
    tier: 2
  - query: "Spring Boot developer"
    tier: 2
  - query: "cloud engineer AWS"
    tier: 2
  - query: "DevOps engineer"
    tier: 2
  - query: "platform engineer"
    tier: 2
  - query: "microservices engineer"
    tier: 2
  - query: "API engineer"
    tier: 2

  # Tier 3 — Wider net
  - query: "software developer"
    tier: 3
  - query: "site reliability engineer"
    tier: 3
  - query: "solutions engineer"
    tier: 3
  - query: "integration engineer"
    tier: 3
  - query: "automation engineer"
    tier: 3
  - query: "cloud developer"
    tier: 3
  - query: "application developer"
    tier: 3

# ── Locations ─────────────────────────────────────────────────────────────────
locations:
  - location: "Tampa, FL"
    remote: false
  - location: "Remote"
    remote: true
  - location: "Florida"
    remote: false

# ── Location filtering ────────────────────────────────────────────────────────
location:
  accept_patterns:
    - "Tampa"
    - "Florida"
    - "FL"
    - "Remote"
    - "Anywhere"
    - "United States"
    - "US"
    - "USA"
    - "Hybrid"
    - "Orlando"
    - "Jacksonville"
    - "Miami"
    - "Atlanta"
    - "Austin"
    - "Dallas"
    - "Charlotte"
  reject_patterns:
    - "onsite only"
    - "London, UK"
    - "India"
    - "Philippines"
    - "Canada only"
    - "Australia only"
    - "New Zealand"

# ── Country ───────────────────────────────────────────────────────────────────
country: "USA"

# ── Job boards ────────────────────────────────────────────────────────────────
boards:
  - indeed
  - linkedin
  - zip_recruiter
  - google

# ── Search defaults ───────────────────────────────────────────────────────────
defaults:
  results_per_site: 100   # Max results per board per query
  hours_old: 72           # Only jobs posted in the last 72 hours

# ── Negative keywords — skip jobs with these in the title ─────────────────────
exclude_titles:
  - "senior director"
  - "VP "
  - "vice president"
  - "chief"
  - "intern"
  - "internship"
  - "co-op"
  - "clearance required"
  - "TS/SCI"
  - "principal scientist"
  - "staff scientist"
  - "distinguished engineer"
  - "fellow"
  - "C++ only"
  - "embedded systems"
  - "firmware"
  - "FPGA"
